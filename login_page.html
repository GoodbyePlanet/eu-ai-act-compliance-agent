<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EU AI Act Compliance Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="static/favicon.png">
    <style>
        :root {
            --bg: #ffffff;
            --border: #e0e0e0;
            --text-main: #000000;
            --text-dim: #666666;
            --accent: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 8%;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .logo {
            font-weight: 900;
            letter-spacing: -1.5px;
            font-size: 1.4rem;
            text-transform: uppercase;
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 73px);
            padding: 60px 8%;
            text-align: center;
        }

        h1 {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 1.5rem;
        }

        p {
            font-size: 1.1rem;
            color: var(--text-dim);
            max-width: 520px;
            margin: 0 auto 2.5rem;
        }

        .login-btn {
            background: var(--accent);
            color: white;
            padding: 18px 40px;
            font-size: 1rem;
            font-weight: 700;
            text-decoration: none;
            border-radius: 2px;
            display: inline-block;
            transition: 0.2s ease-in-out;
        }

        .login-btn:hover {
            opacity: 0.8;
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">AI.ACT.AGENT</div>
        <div style="font-weight: 700; font-size: 0.7rem;">[ v1.0.0 ]</div>
    </nav>
    <main>
        <h1>EU AI Act<br>Compliance Agent</h1>
        <p>To start an AI tool assessment, please authenticate with your Google Workspace account.</p>
        <a href="__STREAMLIT_LOGIN_URL__" class="login-btn">Login with Google</a>
    </main>
    <iframe src="__STREAMLIT_URL__" style="display:none;width:0;height:0;border:none;" aria-hidden="true"></iframe>
</body>
</html>
